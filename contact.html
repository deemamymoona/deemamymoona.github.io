<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Deema Mymoona</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-item home-icon" onclick="navigateWithTransition('index.html')" title="Home">
                <i class="fas fa-home"></i>
            </div>
            <div class="sidebar-item profile-icon" onclick="navigateWithTransition('about.html')" title="About">
                <i class="fas fa-user"></i>
            </div>
            <div class="sidebar-item education-icon" onclick="navigateWithTransition('education.html')" title="Education">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="sidebar-item skills-icon" onclick="navigateWithTransition('skills.html')" title="Skills">
                <i class="fas fa-star"></i>
            </div>
            <div class="sidebar-item portfolio-icon" onclick="navigateWithTransition('experience.html')" title="Experience">
                <i class="fas fa-briefcase"></i>
            </div>
            <div class="sidebar-item services-icon" onclick="navigateWithTransition('projects.html')" title="Projects">
                <i class="fas fa-folder-open"></i>
            </div>
            <div class="sidebar-item contact-icon active" title="Contact">
                <i class="fas fa-envelope"></i>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content about-page">
            <div class="about-container">
                <div class="about-header">
                    <h2 class="about-title">Contact</h2>
                    <div class="title-underline"></div>
                </div>

                <div class="contact-layout">
                    <div class="contact-info-card">
                        <h3>Get in Touch</h3>
                        <p>I'm always open to new opportunities and collaborations. Feel free to reach out!</p>
                        <div class="contact-details">
                            <div class="contact-item">
                                <div class="contact-icon-wrap"><i class="fas fa-envelope"></i></div>
                                <div>
                                    <span class="contact-label">Email</span>
                                    <a href="mailto:deemaafsal@gmail.com" class="contact-value">deemaafsal@gmail.com</a>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon-wrap"><i class="fas fa-phone"></i></div>
                                <div>
                                    <span class="contact-label">Phone</span>
                                    <span class="contact-value">7736743832</span>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon-wrap"><i class="fas fa-map-marker-alt"></i></div>
                                <div>
                                    <span class="contact-label">Location</span>
                                    <span class="contact-value">Kerala, India</span>
                                </div>
                            </div>
                        </div>
                        <div class="contact-social">
                            <a href="https://www.linkedin.com/in/deema-mymoona" target="_blank" class="contact-social-link"><i class="fab fa-linkedin"></i></a>
                            <a href="https://github.com/deemamymoona" target="_blank" class="contact-social-link"><i class="fab fa-github"></i></a>
                        </div>
                    </div>

                    <form class="contact-form">
                        <div class="form-group">
                            <label for="contact-name">Name</label>
                            <input type="text" id="contact-name" name="name" placeholder="Your Name" autocomplete="off" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-email">Email</label>
                            <input type="email" id="contact-email" name="email" placeholder="your@email.com" autocomplete="off" required>
                        </div>
                        <div class="form-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" name="message" rows="4" placeholder="Your message..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary contact-send-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
